<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facial Recognition System | Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
    }

    /* Glassmorphism Card Effect */
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    /* Scanning Icon Animation */
    .icon-box {
      font-size: 60px;
      margin-bottom: 20px;
      color: #00d2ff;
      position: relative;
      display: inline-block;
    }

    .icon-box::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #00d2ff;
      box-shadow: 0 0 15px #00d2ff;
      animation: scan 2s infinite ease-in-out;
    }

    @keyframes scan {
      0%, 100% { top: 0%; }
      50% { top: 100%; }
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      margin-bottom: 40px;
      color: #cbd5e0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    /* Admin Button Styles */
    .btn-admin {
      background: transparent;
      border: 2px solid #fff;
      color: white;
    }

    .btn-admin:hover {
      background: white;
      color: #302b63;
    }

    /* Employee Button Styles */
    .btn-employee {
      background: #00d2ff;
      color: #0f0c29;
    }

    .btn-employee:hover {
      background: #009ec1;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
    }

    .footer-text {
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="icon-box">
    <i class="fas fa-user-shield"></i>
  </div>
  
  <h1>FaceID Attendance</h1>
  <p>Secure Biometric Portal</p>

  <div class="button-group">
    <a href="employee.html" class="btn btn-employee">
      <i class="fas fa-camera"></i> Employee Check-In
    </a>
    <a href="login.html" class="btn btn-admin">
      <i class="fas fa-lock"></i> Admin Dashboard
    </a>
  </div>

  <div class="footer-text">
    &copy; 2026 Smart Attendance Systems
  </div>
</div>

</body>
</html>
